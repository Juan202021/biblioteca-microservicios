version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: biblioteca_postgres
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  catalog-service:
    build: ./catalog-service
    container_name: biblioteca_catalog
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: catalog_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      AUTH_SERVICE_URL: http://identity-service:5132
    depends_on:
      postgres:
        condition: service_healthy
      identity-service:
        condition: service_started

  identity-service:
    build: ./mini-identity-api-dotnet-main/mini-identity-api-dotnet-main
    container_name: biblioteca_identity
    ports:
      - "5132:5132"
    depends_on:
      - postgres

volumes:
  postgres_data:
